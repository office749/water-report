<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 680" role="img" aria-label="Llewellyn Plumbing - complete plumbing service - residential commercial repair">
  <!-- ===== Wordmark ===== -->
  <!-- "Llewellyn" in italic dark blue, Georgia-style -->
  <text x="100" y="330"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="400"
        font-size="260"
        fill="#114B78">Llewellyn</text>

  <!-- "PLUMBING" in bright blue bold, sans -->
  <text x="960" y="360"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="340"
        fill="#1B74BB"
        letter-spacing="-6">PLUMBING</text>

  <!-- ===== Pipe + faucet, all solid black ===== -->
  <!-- Left flange -->
  <rect x="40" y="390" width="70" height="110" fill="#000"/>
  <!-- Pipe body (spans almost full width) -->
  <rect x="100" y="410" width="2110" height="70" fill="#000"/>

  <!-- Faucet body on the far right (vertical block the pipe feeds up into) -->
  <rect x="2150" y="355" width="100" height="135" fill="#000"/>

  <!-- Vertical valve stem on top of faucet body -->
  <rect x="2175" y="270" width="50" height="90" fill="#000"/>

  <!-- Rounded cap where stem meets valve handle -->
  <rect x="2160" y="255" width="80" height="25" rx="4" fill="#000"/>

  <!-- Valve handle (flat disc on top - like a round wheel viewed edge on) -->
  <ellipse cx="2200" cy="245" rx="95" ry="22" fill="#000"/>
  <rect x="2195" y="210" width="10" height="40" fill="#000"/>

  <!-- Spout coming out of faucet body to the right, then bending down -->
  <rect x="2250" y="400" width="90" height="70" fill="#000"/>
  <rect x="2310" y="430" width="50" height="90" fill="#000"/>
  <rect x="2295" y="510" width="80" height="22" fill="#000"/>

  <!-- ===== Tagline ===== -->
  <text x="100" y="620"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="74"
        fill="#1B74BB">complete plumbing service</text>

  <text x="1340" y="620"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="74"
        fill="#1B74BB">residential  |  commercial  |  repair</text>
</svg>
