# Llewellyn Plumbing water-report - Netlify config
#
# Pure static site. index.html lives at the repo root and there is
# no real build step.
#
# Why the explicit `command`: Netlify's deploy pipeline always runs
# a build phase. If `command` is missing, Netlify falls back to
# framework auto-detection and can land on a non-existent output
# directory like public/ or dist/, producing a "successful" deploy
# with zero files at the publish root. A trivial echo command
# makes the build phase succeed as a no-op so `publish = "."`
# below is actually honored.
[build]
  command = "echo 'static site - no build step'"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
